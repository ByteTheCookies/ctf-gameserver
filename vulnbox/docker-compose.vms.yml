name: vulnbox-vms

services:
  vulnbox-team01:
    build:
      context: .
      dockerfile: vm-dind/Dockerfile
    image: vulnbox-dind:local
    container_name: vulnbox-team01
    hostname: vm-team01
    privileged: true
    restart: unless-stopped
    environment:
      TEAM_ID: "1"
      DOCKER_TLS_CERTDIR: ""
      SSH_ROOT_PASSWORD: "ab8f8eba718e5ef1ffac632c50ae59dccbaacbca"
    volumes:
      - dind-data-team01:/var/lib/docker
    networks:
      vulnbox_vm_net:
        ipv4_address: 10.60.1.1
