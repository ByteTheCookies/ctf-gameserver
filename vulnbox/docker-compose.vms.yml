name: vulnbox-vms

services:
  vulnbox-team01:
    build:
      context: .
      dockerfile: vm-dind/Dockerfile
    image: vulnbox-dind:local
    container_name: vulnbox-team01
    hostname: vm-team01
    privileged: true
    restart: unless-stopped
    environment:
      TEAM_ID: "1"
      DOCKER_TLS_CERTDIR: ""
      SSH_ROOT_PASSWORD: "fce95d9ac0cd1e3cac3efcedc0f946cd43a7baae"
    volumes:
      - dind-data-team01:/var/lib/docker
    networks:
      vulnbox_vm_net:
        ipv4_address: 10.60.1.1
  vulnbox-team02:
    build:
      context: .
      dockerfile: vm-dind/Dockerfile
    image: vulnbox-dind:local
    container_name: vulnbox-team02
    hostname: vm-team02
    privileged: true
    restart: unless-stopped
    environment:
      TEAM_ID: "2"
      DOCKER_TLS_CERTDIR: ""
      SSH_ROOT_PASSWORD: "c05defa8a8244fedbaef3fcafe215f9908f54a2b"
    volumes:
      - dind-data-team02:/var/lib/docker
    networks:
      vulnbox_vm_net:
        ipv4_address: 10.60.2.1

volumes:
  dind-data-team01:
  dind-data-team02:

networks:
  vulnbox_vm_net:
    name: vulnbox_vm_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.60.0.0/16
