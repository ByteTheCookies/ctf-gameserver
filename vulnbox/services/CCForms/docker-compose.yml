services:
  frontend:
    build: ./form
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    depends_on:
      backend:
        condition: service_started
  backend:
    build: ./api
    restart: unless-stopped
    volumes:
      - ./api/forms:/app/forms
    environment:
      - JWT_SECRET
    ports:
      - "0.0.0.0:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    restart: unless-stopped
    volumes:
      - ./db/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=password
    build: ./db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
