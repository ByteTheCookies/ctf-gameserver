services:
  frontend:
    build: ./form
    ports:
      - 3000:3000
    networks:
      - app_net
  backend:
    build: ./api
    volumes:
      - ./api/forms:/app/forms
    environment:
      - JWT_SECRET
    ports:
      - 3001:3001
    depends_on:
      - postgres
    networks:
      - app_net
  postgres:
    volumes:
      - ./db/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=password
    build: ./db
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
